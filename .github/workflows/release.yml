name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write    # required for npm provenance AND Sigstore keyless signing

jobs:
  # Gate: single source of truth — same script locally and in CI.
  # Runs once on a single OS; build matrix below is gated on this passing.
  verify:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
    - uses: actions/setup-node@v6
      with:
        node-version: '22.x'
        cache: npm
        cache-dependency-path: |
          package-lock.json
          extension/vscode/package-lock.json

    - name: Verify tag matches package.json version
      run: |
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        PKG_VERSION=$(node -p "require('./package.json').version")
        if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
          echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
          exit 1
        fi

    - name: Run release verification
      run: make release-verify

  # Build per-OS via matrix. CGO requires platform-native toolchains; we use
  # one runner per OS family. Linux runner produces both amd64 (native) and
  # arm64 (cross-compiled with gcc-aarch64-linux-gnu).
  #
  # Each runner builds its own slice via goreleaser `build --id=<list>`, then
  # packages/signs via `release --skip-build --skip=publish,validate`. The
  # aggregator job below downloads all artifacts and creates a single GitHub
  # Release.
  go-release-build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_ids: terrain-linux-amd64,terrain-linux-arm64
            artifact_name: terrain-linux
          - os: macos-latest
            build_ids: terrain-darwin
            artifact_name: terrain-darwin
          - os: windows-latest
            build_ids: terrain-windows
            artifact_name: terrain-windows
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    # Linux arm64 needs a cross-compiler.
    - name: Install aarch64 cross-compiler (linux only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

    # Install syft for SBOM generation.
    - name: Install syft
      uses: anchore/sbom-action/download-syft@v0
      with:
        syft-version: 'v1.18.1'

    # Install cosign for Sigstore keyless signing.
    - name: Install cosign
      uses: sigstore/cosign-installer@v3

    - name: Run GoReleaser (build only, this matrix's IDs)
      uses: goreleaser/goreleaser-action@v6
      with:
        version: '~> v2'
        args: build --clean --id ${{ matrix.build_ids }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        COSIGN_ENABLED: "1"

    # Run goreleaser's release pipeline (archives, SBOMs, signs, checksums)
    # without publishing or rebuilding. The build step above already produced
    # binaries for this matrix entry.
    - name: Package + sign artifacts
      uses: goreleaser/goreleaser-action@v6
      with:
        version: '~> v2'
        args: release --clean --skip=publish,validate --skip-build
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        COSIGN_ENABLED: "1"

    - name: Upload OS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          dist/*.tar.gz
          dist/*.zip
          dist/checksums.txt
          dist/*.cdx.json
          dist/*.spdx.json
          dist/*.sig
          dist/*.pem
        if-no-files-found: error
        retention-days: 7

  # Aggregate all per-OS artifacts and create a single GitHub Release.
  go-release-publish:
    needs: go-release-build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/download-artifact@v4
      with:
        path: dist-merged

    - name: Flatten artifacts
      run: |
        mkdir -p dist
        find dist-merged -type f -exec cp -v {} dist/ \;
        ls -la dist/

    - name: Recompute checksums (single combined file)
      working-directory: dist
      run: |
        # Each per-OS goreleaser run produced its own checksums.txt; merge into one.
        rm -f checksums.txt
        sha256sum *.tar.gz *.zip *.cdx.json *.spdx.json 2>/dev/null | sort -k 2 > checksums.txt
        cat checksums.txt

    - name: Install cosign
      uses: sigstore/cosign-installer@v3

    - name: Sign combined checksums
      run: |
        cosign sign-blob \
          --yes \
          --output-signature=dist/checksums.txt.sig \
          --output-certificate=dist/checksums.txt.pem \
          dist/checksums.txt
      env:
        COSIGN_EXPERIMENTAL: "1"

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${GITHUB_REF_NAME}"
        gh release create "$TAG" \
          --title "$TAG" \
          --generate-notes \
          dist/*

  # Homebrew tap update runs after the GitHub Release is live so it can pull
  # darwin archives. Uses the same goreleaser config but only the brews block.
  homebrew-publish:
    needs: go-release-publish
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Install syft
      uses: anchore/sbom-action/download-syft@v0
      with:
        syft-version: 'v1.18.1'

    - name: Run GoReleaser (publish brews only)
      uses: goreleaser/goreleaser-action@v6
      with:
        version: '~> v2'
        # Re-runs the darwin build then publishes the brew formula. Skips signs
        # because we don't need Sigstore signatures for the formula update.
        args: release --clean --skip=publish,validate,sign
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  npm-release:
    needs: [verify, go-release-publish]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: '22.x'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm ci

    - name: Publish to npm
      run: npm publish --provenance --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
