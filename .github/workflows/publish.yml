name: Verify Release

# Safety net: if a GitHub Release is created manually (not via release.yml),
# run the test suite to surface any issues. Does NOT publish — release.yml
# handles npm publish on tag push.
on:
  release:
    types: [created]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: |
            package-lock.json
            extension/vscode/package-lock.json

      - name: Run release verification
        run: make release-verify
