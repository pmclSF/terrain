name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

  go-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go tests (no cache masking)
        run: go test ./... -count=1

  go-bench-compare:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Benchmark current HEAD
        run: |
          go test ./internal/engine ./internal/analysis ./internal/scoring ./internal/testcase \
            -run '^$' \
            -bench 'BenchmarkRunPipeline|BenchmarkSignalDetection|BenchmarkBuildImportGraph|BenchmarkRiskScore|BenchmarkExtractTestCases' \
            -count=5 > /tmp/bench_head.txt

      - name: Benchmark PR base
        run: |
          git checkout "${{ github.event.pull_request.base.sha }}"
          go test ./internal/engine ./internal/analysis ./internal/scoring ./internal/testcase \
            -run '^$' \
            -bench 'BenchmarkRunPipeline|BenchmarkSignalDetection|BenchmarkBuildImportGraph|BenchmarkRiskScore|BenchmarkExtractTestCases' \
            -count=5 > /tmp/bench_base.txt

      - name: Compare benchmark results (base vs head)
        run: |
          git checkout "${{ github.sha }}"
          "$(go env GOPATH)/bin/benchstat" /tmp/bench_base.txt /tmp/bench_head.txt | tee /tmp/benchstat.txt

      - name: Append benchstat summary
        run: |
          {
            echo '### Go Benchmark Comparison (base vs head)'
            echo ''
            echo '```'
            cat /tmp/benchstat.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    runs-on: ubuntu-latest
    needs: [test, go-test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify CLI works
        run: |
          node bin/hamlet.js --version
          node bin/hamlet.js --help
          node bin/hamlet.js list-conversions

      - name: Test Cypress to Playwright conversion
        run: |
          echo "describe('Test', () => { it('works', () => { cy.visit('/'); }); });" > /tmp/test.cy.js
          node bin/hamlet.js convert /tmp/test.cy.js --from cypress --to playwright -o /tmp/out1
          cat /tmp/out1/test.spec.js

      - name: Test Playwright to Cypress conversion  
        run: |
          echo "import { test } from '@playwright/test'; test('works', async ({ page }) => { await page.goto('/'); });" > /tmp/test.spec.js
          node bin/hamlet.js convert /tmp/test.spec.js --from playwright --to cypress -o /tmp/out2
          cat /tmp/out2/test.cy.js
