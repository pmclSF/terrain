name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  npm-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify lockfile is in sync
        run: |
          # npm ci already fails on package.json/lockfile mismatch, but this
          # catches subtler drift: e.g. someone ran `npm install` which silently
          # updated resolved URLs or integrity hashes without changing ranges.
          npm install --package-lock-only --ignore-scripts
          git diff --exit-code package-lock.json || {
            echo "::error::package-lock.json is out of sync with package.json. Run 'npm install' locally and commit the updated lockfile."
            exit 1
          }

      - name: Verify npm package wrapper
        run: npm test

  # ── Go (analysis engine) ────────────────────────────────────
  # Matrix-tested across the three OS families we ship binaries for.
  # ubuntu remains the canonical runner (race detector + extended smoke
  # suite); macos and windows run a reduced "does it build and pass unit
  # tests" check so platform-specific regressions surface in PRs rather
  # than at release time. Round 4 review flagged single-OS coverage as a
  # gap; without this matrix windows path-separator and EOL bugs only
  # showed up after binaries shipped.
  go-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            extended: true
            required: true
          - os: macos-latest
            extended: false
            required: true
          - os: windows-latest
            extended: false
            required: false
    runs-on: ${{ matrix.os }}
    # Windows-only failures are surfaced for visibility but do not block
    # merges in 0.1.2. Several pre-existing path-handling bugs in the
    # heatmap, impact, migration, and scoring packages — plus a long-tail
    # AI-workflow test that hangs on Windows — need a dedicated 0.2 sweep.
    # Until that lands the Windows runner is informational so we can keep
    # observing regressions without blocking the merge train.
    continue-on-error: ${{ !matrix.required }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for fixture repos with git commits

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify go.mod is tidy
        if: matrix.extended
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run core Go verification
        if: matrix.extended
        run: make go-release-verify

      - name: Determinism gate
        if: matrix.extended
        # Three back-to-back runs against the same fixture must produce
        # byte-identical snapshots. Round 4 review flagged that determinism
        # was being asserted by a single-shot test rather than gated in CI;
        # this step closes that gap. Failure here means a non-deterministic
        # data path crept in (typically an unsorted map or a timestamp).
        run: make test-determinism

      - name: Run Go tests
        # The race detector adds significant runtime cost; on macos and
        # windows runners we omit it to keep PR feedback fast. ubuntu
        # remains the canonical environment for race-detection.
        run: |
          if [ "${{ matrix.extended }}" = "true" ]; then
            go test ./internal/... ./cmd/... -count=1 -race
          else
            go test ./internal/... ./cmd/... -count=1
          fi
        shell: bash

      - name: Smoke-test terrain CLI
        if: matrix.extended
        run: |
          go build -o terrain ./cmd/terrain
          ./terrain version
          ./terrain version --json > /dev/null
          ./terrain --help > /dev/null
          ./terrain ai --help > /dev/null
          ./terrain migration --help > /dev/null
          ./terrain debug --help > /dev/null
          ./terrain export --help > /dev/null
          ./terrain analyze --root tests/fixtures/sample-repo --json > /dev/null
          ./terrain insights --root tests/fixtures/sample-repo --json > /dev/null

      - name: Smoke-test fixture matrix
        if: matrix.extended
        run: |
          for fixture in high-fanout weak-coverage legacy-mixed ai-eval-suite skipped-tests; do
            echo "--- fixture: $fixture ---"
            ./terrain analyze --root "tests/fixtures/$fixture" --json > /dev/null
          done

      - name: Benchmark smoke tests (4 canonical commands)
        if: matrix.extended
        run: |
          echo "=== benchmark: sample-repo ==="
          go build -o terrain ./cmd/terrain
          ./terrain analyze --root tests/fixtures/sample-repo --json | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['testsDetected']['testFileCount'] > 0, 'analyze: no test files'"
          ./terrain insights --root tests/fixtures/sample-repo --json | python3 -c "import sys,json; d=json.load(sys.stdin); assert 'healthGrade' in d, 'insights: no health grade'"

          echo "=== benchmark: ai-eval-suite ==="
          ./terrain analyze --root tests/fixtures/ai-eval-suite --json | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['testsDetected']['testFileCount'] > 0, 'analyze: no test files'"
          ./terrain ai list --root tests/fixtures/ai-eval-suite --json | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['summary']['scenarios'] > 0, 'ai list: no scenarios'"

          echo "=== benchmark: backend-api ==="
          ./terrain analyze --root tests/fixtures/backend-api --json | python3 -c "import sys,json; d=json.load(sys.stdin); assert len(d.get('riskPosture',[])) == 5, 'analyze: expected 5 posture dimensions'"

          echo "All benchmark smoke tests passed."

  extension:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: extension/vscode/package-lock.json

      - name: Verify VS Code extension
        run: make extension-verify

  # ── Go benchmark comparison (PRs only) ──────────────────────
  go-bench-compare:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install benchstat
        run: GOTOOLCHAIN=auto go install golang.org/x/perf/cmd/benchstat@latest

      - name: Benchmark current HEAD
        run: |
          go test ./internal/engine ./internal/analysis ./internal/scoring ./internal/testcase \
            -run '^$' \
            -bench 'BenchmarkRunPipeline|BenchmarkSignalDetection|BenchmarkBuildImportGraph|BenchmarkRiskScore|BenchmarkExtractTestCases' \
            -count=5 > /tmp/bench_head.txt

      - name: Benchmark PR base
        run: |
          git checkout "${{ github.event.pull_request.base.sha }}"
          go test ./internal/engine ./internal/analysis ./internal/scoring ./internal/testcase \
            -run '^$' \
            -bench 'BenchmarkRunPipeline|BenchmarkSignalDetection|BenchmarkBuildImportGraph|BenchmarkRiskScore|BenchmarkExtractTestCases' \
            -count=5 > /tmp/bench_base.txt

      - name: Compare benchmark results (base vs head)
        run: |
          git checkout "${{ github.sha }}"
          "$(go env GOPATH)/bin/benchstat" /tmp/bench_base.txt /tmp/bench_head.txt | tee /tmp/benchstat.txt

      - name: Append benchstat summary
        run: |
          {
            echo '### Go Benchmark Comparison (base vs head)'
            echo ''
            echo '```'
            cat /tmp/benchstat.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
