    E1: { score: 4, evidence: "internal/aidetect/ extensively tested; recall-regression fixture set integration." }
    E2: { score: 3, evidence: "Recall-anchor fixtures exercise the AI detector set via calibration_integration_test.go. Several precision concerns remediated in-flight." }
    E3: { score: 4, evidence: "Detectors emit per-finding explanations + inputs lists. Detector budget visibility surfaces per-detector timing in --verbose. Capability metadata in manifest documents detector inputs (file IO, graph, runtime, eval-artifact) for every entry." }
    E4: { score: 4, evidence: "SignalManifestEntry schema versioned via models.SchemaVersion. aiHallucinationRate alias-with-deprecation. docs/schema/eval-adapters.md publishes the related contract." }
    E5: { score: 4, evidence: "File-scan based; bounded by snapshot size. Per-detector budgets prevent runaway detectors. Bench numbers in benchmarks/baseline.txt." }
    E6: { score: 4, evidence: "Inherits." }
    E7: { score: 4, evidence: "ctx audit on AI detectors: DetectContext respects ctx with deliberately-slow-detector test. Budget enforcement." }
    V1: { score: 4, evidence: "AISubdomainOf / AISubdomainTrustBadge helpers centralize AI-specific badge vocabulary. AI risk renderer in PR comment consumes from uitokens.BracketedSeverity (changescope/render.go this stack)." }
    V2: { score: 4, evidence: "inventory/hygiene/regression sub-stanzas in PR comment (unified shape). Hero verdict block frames the gating decision (this stack's ai_execution_gating.V2)." }
    V3: { score: 3, evidence: "AI risk findings emit but provide no remediation pointers tailored to the LLM context (e.g. 'check if your prompt template uses {{ variable }} substitution')." }

  ai_eval_ingestion:
    P1: { score: 4, evidence: "Three adapters covering the canonical eval-framework set (Promptfoo v3+v4 with stats-block + per-row fallback, DeepEval 1.x with metrics-aware aggregation, Ragas modern+legacy with quality-axis vote). Baseline-snapshot regression mechanism. Per-field IngestionDiagnostic surfaces every adapter fallback. Conformance fixtures lock parser semantics per framework x version. Published schema contract (docs/schema/eval-adapters.md) for adopters who want to add a custom adapter." }
    P2: { score: 3, evidence: "Strong-evidence results when adapters parse correctly. Edge cases (provider-crash rows, missing cost fields) handled in adapter-polish work." }
    P3: { score: 4, evidence: "Trust-boundary doc. ai-eval-ci/ walkthrough. ai-risk-tiers doc." }
    P4: { score: 4, evidence: "docs/user-guides/ai-eval-onboarding.md gives the three-step flow (ai list - run framework yourself - ai run), per-framework invocations, and ingestion-diagnostics interpretation. --promptfoo-results / --deepeval-results / --ragas-results documented in `terrain analyze --help` and the integration docs." }
    P5: { score: 4, evidence: "Adapter parse-failure path (cmd_ai.go loadEvalRunByFramework caller) surfaces a per-framework remediation block: Promptfoo v3-vs-v4 nesting, DeepEval --export flag missing, Ragas CSV-vs-JSON output, plus links to docs/schema/eval-adapters.md and docs/user-guides/ai-eval-onboarding.md." }
    P6: { score: 4, evidence: "Conformance fixtures per (framework x version) - 8 fixtures across Promptfoo v3/v4, DeepEval 1.x, Ragas modern/legacy." }
    P7: { score: 4, evidence: "Eval-artifact ingestion is a real differentiator vs. tools that only do static analysis." }
    E1: { score: 4, evidence: "Conformance test suite covering canonical + drift shapes per framework." }
    E2: { score: 3, evidence: "ShapeInfo + warn-on-drift surfaces unfamiliar shapes." }
    E3: { score: 4, evidence: "Per-field ingestion diagnostics: every adapter (Promptfoo, DeepEval, Ragas) records IngestionDiagnostic entries for each fallback (computed aggregates, missing cost, defaulted timestamp, etc.). Surfaced in `terrain ai run` text output and JSON envelope. Tests: TestParsePromptfoo_DiagnosticsOnDerivedAggregates + TestParsePromptfoo_DiagnosticsOnMissingCost lock the canonical diagnostics." }
    E4: { score: 4, evidence: "docs/schema/eval-adapters.md publishes the canonical EvalRunResult / EvalCase / EvalAggregates / TokenUsage / IngestionDiagnostic contract with field-level Stability tiers, adapter-authoring checklist, and pointers to per-framework conformance fixtures." }
    E5: { score: 4, evidence: "JSON parsing; fast." }
    E6: { score: 4, evidence: "Inherits." }
    E7: { score: 3, evidence: "Top-level honored; reads are bounded so inner-loop checks aren't critical." }
    V1: { score: 4, evidence: "Adapter outputs flow into `terrain ai run` (HeroVerdict + BracketedSeverity for AI signals + ingestion-diagnostics block) and the PR-comment AI Risk Review section (uses uitokens.BracketedSeverity for every signal). Both consumer surfaces use the centralized vocabulary; no raw ANSI / ad-hoc symbols in adapter-driven output paths." }
    V2: { score: 4, evidence: "`terrain ai run` output: hero verdict block at top, then structured Reason / Command / AI Signals / Ingestion diagnostics sections - each visually distinct with consistent rhythm. Aggregate-vs-per-case data renders consistently across adapters because all three feed the same EvalRunResult shape." }
    V3: { score: 4, evidence: "Empty states: `EmptyNoAISurfaces` for AI inventory; designed remediation block when adapter parsing fails covers the framework-mismatch case; `terrain ai doctor` covers the broader 'why is nothing detected?' path." }

  ai_execution_gating:
    P1: { score: 3, evidence: "Common flow works end-to-end: terrain ai run ingests eval artifacts (Promptfoo / DeepEval / Ragas), emits a baseline-aware decision, surfaces hero verdict + ingestion diagnostics + AI signals. Trust-boundary doc clarifies what Terrain executes vs parses, and ai-eval-onboarding.md gives the explicit three-step flow with per-framework commands. Rough edges remain (no standalone `ai gate` command - `ai run` covers the gating use case)." }
    P2: { score: 3, evidence: "Decisions match what the artifact data supports; we're not making model claims." }
    P3: { score: 4, evidence: "Trust-boundary doc - what executes vs parses, per-command surface, sandboxing roadmap." }
    P4: { score: 4, evidence: "docs/user-guides/ai-eval-onboarding.md - first-10-minutes walkthrough with explicit 'what Terrain does vs. what you do' table, three-step flow, per-framework commands, common-questions section." }
    P5: { score: 4, evidence: "Adapter ingestion failures within `terrain ai run` surface a per-framework remediation block (see ai_eval_ingestion.P5). Baseline-missing path still graceful-no-ops." }
    P6: { score: 4, evidence: "End-to-end Promptfoo+Terrain CI walkthrough." }
    P7: { score: 4, evidence: "AI eval gating before merge is the canonical adopter use case. Onboarding doc frames it explicitly; trust-boundary doc clarifies what 'gating on AI evals' means concretely." }
    E1: { score: 4, evidence: "Decision logic test coverage in cmd_ai_test.go: TestEvaluateAIRunDecision_{GovernanceBlock, GovernanceWarn_NotBlock, BlockingSignalTypes, CriticalAndPolicyTogether, GovernanceMetadataMissing, GovernanceMetadataNonStringRule, OnlyHighSeverity_DoesNotBlock} cover the block_on_*/warn_on_* precedence rule, the blocking_signal_types special case, combined critical+policy reasoning, and the type-safety edge cases. Integration tests on parsers retained." }
    E2: { score: 3, evidence: "Recall-anchor inheritance: the gating decision composes signals from the detector set anchored by calibration_integration_test.go. Decision-logic precedence (block_on_*/warn_on_*, blocking_signal_types, governance metadata) covered by TestEvaluateAIRunDecision_* (cmd_ai_test.go) - every branch locked." }
    E3: { score: 4, evidence: "Per-input ingestion diagnostics surfaced in `terrain ai run` output (cmd_ai.go:605) - adopters see exactly which adapter fields fell back, in 'Ingestion diagnostics' block. Pairs with ai_eval_ingestion.E3." }
    E4: { score: 4, evidence: "Decision shape (airun.Decision) is versioned alongside the rest of the eval-result schema. docs/schema/eval-adapters.md documents the EvalRunResult contract; the decision flows the IngestionDiagnostic data so consumers can audit the evidence chain end-to-end." }
    E5: { score: 4, evidence: "Trivial." }
    E6: { score: 4, evidence: "Inherits." }
    E7: { score: 4, evidence: "engine.RunPipelineContext propagates ctx into snapshot construction; AI risk detectors honor ctx.Err() in inner loops (audit). TestRunPipelineContext_RespectsCancelledContext + TestRunPipelineContext_CancelMidFlight lock the contract for the underlying pipeline that ai run consumes." }
    V1: { score: 4, evidence: "Hero verdict block + ingestion diagnostics block + AI signals block all consume from internal/uitokens. No raw ANSI escapes or ad-hoc symbols in the user-visible `terrain ai run` paths." }
    V2: { score: 4, evidence: "Hero verdict block in `terrain ai run` (cmd_ai.go:585) - uitokens.HeroVerdict frames the decision (BLOCKED / WARN / PASS) with rule + indented badge + headline. Reason flows below as a structured Reason: line. Tests in uitokens_test.go (TestHeroVerdict, TestHeroVerdictMarkdown) lock the shape." }
    V3: { score: 3, evidence: "EmptyNoAISurfaces wired into `terrain ai list` empty-result path (cmd/terrain/cmd_ai.go:242). Gate-blocked decisions still lack a designed remediation block." }

