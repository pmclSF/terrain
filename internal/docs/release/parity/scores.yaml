# Per-cell parity scores for the 12 functional areas x 17 axes rubric.
#
# Each cell is scored 1-5 with one-line evidence (file:line, test name,
# or "no evidence found"). When a cell is lifted, this file is updated
# alongside the code change. The parity-gate tool reads this file and
# compares against the floors defined in rubric.yaml.
#
# When this file is in conflict with the audit notes (during a parity-
# lift change), the audit notes are the human-readable record and this
# file is the machine-readable enforcement. Both update together.

schema_version: "1"

# Per-area, per-axis score with evidence pointer.
scores:
  core_analyze:
    P1: { score: 4, evidence: "Snapshot covers test files / frameworks / signals / code units / coverage / runtime / ownership / AI surfaces / eval scenarios. Edge case gaps: dynamic test generation heuristic; no first-class monorepo workspace support." }
    P2: { score: 3, evidence: "Recall-regression fixture set pins recall across the detector set (internal/engine/calibration_integration_test.go)." }
    P3: { score: 4, evidence: "Schema field tier doc, trust-boundary doc, alignment-first migration framing, truth-verify gate." }
    P4: { score: 4, evidence: "terrain init + terrain analyze work on any directory. Gap: no terrain init --emit-ci-workflow." }
    P5: { score: 4, evidence: "analyzeFailureRemediation in cmd_analyze.go surfaces a designed remediation block when the analyze pipeline fails. Three branches: (1) timeout-exceeded with `--timeout` increase / scope-down / verbose-timing nudges; (2) cancelled (Ctrl-C) with re-run hint; (3) generic with the three common causes (non-git root, permission errors, malformed artifacts) plus `--verbose` / `--json` next steps. validateCommandInputs continues to catch arg-shape errors up-front." }
    P6: { score: 4, evidence: "docs/examples/{understand,align,gate}/ shipped alongside the Promptfoo+Terrain CI walkthrough and the multi-repo example." }
    P7: { score: 4, evidence: "Maps directly to alignment use case (where do tests cover code? where don't they?)." }
    E1: { score: 4, evidence: "Adversarial filesystem suite with 8 hostile inputs (binary files, BOM, NUL bytes, nested .git, deep nesting), plus the schema migration fixture on top of the standing unit + integration + golden coverage." }
    E2: { score: 3, evidence: "Recall gate locked in (calibration_integration_test.go - t.Errorf on any false negative across the fixture set x the detector set). Only labeled signals participate." }
    E3: { score: 4, evidence: "Capability metadata + missing-input diagnostics surface per-detector requirements; detector budgets emit budget markers when exceeded; per-component timing in --verbose." }
    E4: { score: 4, evidence: "models.SnapshotSchemaVersion = '1.1.0'; SignalV2 fields are omitempty. docs/schema/FIELD_TIERS.md publishes the Stable/Beta/Internal tier markers for snapshot fields explicitly - every JSON field carries a documented stability tier." }
    E5: { score: 4, evidence: "benchmarks/baseline.txt committed with reference numbers across the engine pipeline (small/medium/large), insights builder, and PR-comment renderer. make bench-gate compares ratios against this baseline. Tree-sitter parser pool added. Self-scan ~99s on Terrain repo; per-stage timing visible via `--verbose`." }
    E6: { score: 4, evidence: "make test-determinism enforces SOURCE_DATE_EPOCH byte-identical output. sortSignals uses sort.SliceStable with Symbol tiebreaker." }
    E7: { score: 4, evidence: "ctx audit on AI detectors - DetectContext respects ctx in inner loops with deliberately-slow-detector test. Budget enforcement provides safety net for unaware detectors." }
    V1: { score: 4, evidence: "Analyze report renderers consume uitokens.BracketedSeverity for every severity badge: analyze_report_v2.go (Key Findings), analyze_report.go (per-signal). PR comment renderer migrated in pr_change_scoped.V1. Policy renderer migrated in policy_governance.V1. No raw `[%s]` + ToUpper inline severity mappings remain in user-visible Understand-pillar paths." }
    V2: { score: 4, evidence: "Analyze report rhythm: Key Findings as numbered list with severity badges, Validation Inventory in section blocks, Repository Profile as scorecard, AI Risk Inventory grouped, all separated by section rules." }
    V3: { score: 4, evidence: "Empty-repo headline shows an em-dash grade with actionable next-step nudge instead of misleading 'A'. Headline-vs-Key-Finding dedup removed misleading repetition. Pluralization sweep eliminates `(s)` literals across analyze output. analyzeFailureRemediation surfaces a designed three-branch remediation when analysis fails." }

  insights_impact_explain:
    P1: { score: 4, evidence: "terrain explain finding <id>. --explain-selection." }
    P2: { score: 3, evidence: "Output derives from the snapshot; trust inherits from area 1." }
    P3: { score: 4, evidence: "docs/user-guides/drilling-into-findings.md is the playbook: four-command ladder (analyze - insights - impact - explain), per-command question they answer, full 'how confidence is computed' section covering detector confidence, ConfidenceDetail intervals, test-selection confidence, and coverage confidence. Plus per-command example doc files (insights/impact/explain-report.md)." }
    P4: { score: 4, evidence: "Quickstart introduces the four canonical commands. docs/user-guides/drilling-into-findings.md gives the full drill-down ladder with worked examples per command + the four confidence types (detector / interval / test-selection / coverage)." }
    P5: { score: 3, evidence: "exitNotFound = 5 distinguishes missing-entity from analysis-failed. Gap: explain 'couldn't find target' messages don't suggest similar known IDs." }
    P6: { score: 3, evidence: "Per-command example doc files." }
    P7: { score: 4, evidence: "PR-risk-report use case maps directly to impact + pr." }
    E1: { score: 4, evidence: "internal/insights/, internal/impact/, internal/explain/ have unit + integration tests. cmd_explain.go integration-tested via cmd/terrain/cmd_explain_test.go." }
    E2: { score: 3, evidence: "Inherits area 1's recall-regression coverage. Impact selection is heuristic." }
    E3: { score: 3, evidence: "--explain-selection per-test reason chains give the 'why these tests, why not others' view. Detector budgets surface timing breakdowns." }
    E4: { score: 4, evidence: "docs/schema/explain.md documents `terrain explain <target>` dispatch table mapping every accepted target type to output shape (test file, code unit, owner, scenario, finding ID, selection literal). Each output shape references the canonical schema doc (analysis.schema.json / pr-analysis.md / portfolio.md). Field-level Stability tiers documented." }
    E5: { score: 4, evidence: "Performance benchmarks for insights.Build shipped in internal/insights/insights_bench_test.go: BenchmarkBuild_Healthy (~2.5us/op, 1KB), BenchmarkBuild_WithDepgraphResults (~8us/op, 5KB), BenchmarkBuild_LargeSnapshot (500-file synthetic) (~40us/op, 28KB). Linear scaling. Reference numbers committed in the file's package comment." }
    E6: { score: 4, evidence: "Inherits the snapshot determinism gate." }
    E7: { score: 4, evidence: "All three commands (insights / impact / explain) route through runPipelineWithSignals - engine.RunPipelineContext, which checks ctx.Err() at 10+ pipeline stages and is locked by TestRunPipelineContext_RespectsCancelledContext + TestRunPipelineContext_CancelMidFlight (engine/pipeline_test.go). SIGINT delivered to the CLI propagates through the same context." }
    V1: { score: 4, evidence: "Insights renderer migrated to uitokens.BracketedSeverity (insights_report_v2.go: per-finding + edge-case badges). Impact renderer + PR comment renderer migrated in pr_change_scoped.V1. Explain renderer reuses centralized severity / kind vocabularies. No raw severity-bracket patterns remain in user-visible insights/impact/explain paths." }
    V2: { score: 4, evidence: "Information rhythm: insights groups findings by category with badges; impact report has the confidence histogram (E3 lift) + reason chains (--explain-selection); explain emits a designed evidence card per target type. Each command has section rules and consistent indentation." }
    V3: { score: 4, evidence: "Designed empty states wired across all three commands: EmptyZeroFindings in insights (insights_report_v2.go:94), EmptyNoImpact in impact_report.go, EmptyNoTestSelection in impact_drilldown.go RenderProtectiveSet. Plus designed remediation on impact pipeline failures (--base ref, shallow clone, empty diff)." }

  summary_posture_metrics_focus:
    P1: { score: 4, evidence: "summary aggregates posture/risk/trends/recommendations; posture shows per-dimension evidence; metrics is a one-page scorecard; focus ranks next actions." }
    P2: { score: 3, evidence: "Posture bands computed by internal/measurement/registry.go from per-detector results; recall-anchored. Polarity-aware band rendering closed a misleading-output bug." }
    P3: { score: 4, evidence: "docs/product/posture-model.md describes dimensions + questions. Per-measurement explanations in code (buildPostureExplanation)." }
    P4: { score: 4, evidence: "summary is the recommended first read after analyze." }
    P5: { score: 4, evidence: "runPosture / runMetrics / runSummary / runFocus all route through the shared analyzeFailureRemediation helper (cmd_insights.go) - three-branch designed remediation (timeout / cancelled / generic). Falls back gracefully when posture is unknown." }
    P6: { score: 4, evidence: "README + quickstart show summary outputs. docs/examples/{insights,impact,explain}-report.md cover related commands. docs/user-guides/drilling-into-findings.md gives the four-command ladder explicitly. summary is the recommended first-read after analyze." }
    P7: { score: 4, evidence: "Closest area to the headline alignment story: posture dimensions describe how aligned the test surface is with the code surface." }
    E1: { score: 4, evidence: "internal/summary/, internal/measurement/, internal/reporting/ all tested. Polarity-translation tests added." }
    E2: { score: 3, evidence: "Band thresholds (ratioToBand(.05, .15, .30) etc.) are author-tuned. A future scoring revision will re-anchor them." }
    E3: { score: 3, evidence: "posture --verbose shows measurement evidence." }
    E4: { score: 4, evidence: "MeasurementResult schema is versioned; KeyMeasurement is omitempty." }
    E5: { score: 4, evidence: "All read-side; fast." }
    E6: { score: 4, evidence: "Inherits." }
    E7: { score: 4, evidence: "summary / posture / metrics / focus all route through runPipelineWithSignals - engine.RunPipelineContext, locked by TestRunPipelineContext_RespectsCancelledContext + TestRunPipelineContext_CancelMidFlight." }
    V1: { score: 4, evidence: "summary / posture / metrics / focus consume from the same uitokens vocabulary as insights / analyze (BracketedSeverity for measurement signals, Bar for ASCII proportions). Posture-band rendering uses centralized bandMarker symbols - a deliberate distinct vocabulary from severity, but consistent within the posture domain across every renderer." }
    V2: { score: 4, evidence: "summary output reads as a designed document; concrete measurements alongside band labels." }
    V3: { score: 4, evidence: "EmptyZeroFindings empty-state wired into insights (which feeds summary). analyzeFailureRemediation covers all four read-side commands' failure paths. Empty-repo grade em-dash + actionable headline shipped." }

  pr_change_scoped:
    P1: { score: 4, evidence: "report pr --fail-on. --new-findings-only --baseline. --explain-selection. Suppressions honored across pr." }
    P2: { score: 3, evidence: "Inherits area 1. Gap: PR comments may show signals against unchanged files when fan-out detection fires." }
    P3: { score: 4, evidence: "Suppressions docs. unified-pr-comment.md visual contract. Alignment-first migration framing." }
    P4: { score: 4, evidence: "Single recommended GitHub Action template w/ safe defaults. Trust ladder. End-to-end Promptfoo+Terrain CI walkthrough." }
    P5: { score: 4, evidence: "runPR error path (cmd_impact.go) surfaces a designed remediation block when the impact pipeline fails: names the three common adopter causes (--base ref doesn't exist, shallow clone, empty diff) and points at `terrain analyze` as the root-cause drill-down command." }
    P6: { score: 4, evidence: "examples/, ai-eval-ci/ walkthrough, multi-repo example. Visual regression goldens." }
    P7: { score: 4, evidence: "PR risk report without running tests is the right framing. Gap: no 'established repos with debt' mode." }
