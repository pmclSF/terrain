    P3: { score: 4, evidence: "ai-risk-tiers.md documents the inventory/hygiene/regression subdivision. Trust-boundary doc. Per-detector docs/rules/ai/ pages." }
    P4: { score: 4, evidence: "AI surfaces appear in normal analyze output without special flags. terrain ai list/run/doctor available. docs/user-guides/ai-eval-onboarding.md gives the explicit three-step flow." }
    P5: { score: 4, evidence: "Detectors needing missing data emit informative no-op signals. Adapter parse failures surface per-framework remediation (this stack's ai_eval_ingestion.P5 lift). EmptyNoAISurfaces empty state on `terrain ai list`." }
    P6: { score: 4, evidence: "Examples include AI surfaces. ai-eval-ci/ walkthrough. docs/user-guides/ai-eval-onboarding.md is the first-10-minutes guide." }
