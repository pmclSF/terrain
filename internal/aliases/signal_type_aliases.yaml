# Signal-type alias registry — the deprecation runway for rule splits / renames.
#
# When a rule is split or renamed in a later release, the old rule_id is
# registered here. User policies, suppressions, and CLI flags that reference
# the old ID continue to work — they expand to all the new IDs the alias
# replaces. Terrain emits a one-time `[NOTE]` on stderr when an alias is hit,
# pointing at the new IDs so the user can update.
#
# Schema:
#   version:       1
#   aliases:
#     <old_id>:
#       replaces_with:    list of new rule_ids the old ID maps to
#       deprecated_in:    semver when the old ID entered deprecation
#       removal_target:   semver when the alias will stop expanding
#       why:              short prose explaining the split / rename
#
# Adding an alias is part of the same PR that ships the rule split. Removing
# an alias requires bumping `removal_target` past the current release.

version: 1
aliases:
  staticSkippedTest:
    replaces_with:
      - staticSkippedTest-unconditional
      - staticSkippedTest-conditional-gate
    deprecated_in: "next"
    removal_target: "future"
    why: |
      Split into unconditional (skip is permanent, no surrounding gate)
      and conditional-gate (skip is wrapped by an environment, feature-
      flag, or platform predicate). Each half carries its own
      remediation guidance.

  depsDriftRisk:
    replaces_with:
      - depsDriftRisk-strict-pin
      - depsDriftRisk-caret-policy
    deprecated_in: "next"
    removal_target: "future"
    why: |
      Split into strict-pin (bare name or unversioned spec) and
      caret-policy (caret-range usage). Each half can carry its own
      threshold and suppression target.

  aiHardcodedAPIKey:
    replaces_with:
      - aiHardcodedAPIKey-literal-shape
      - secretScannerCoverageDegraded
    deprecated_in: "next"
    removal_target: "future"
    why: |
      Structurally-motivated split. Literal-shape retains the in-repo
      key-shaped-string detection capability; coverage-degraded flags
      the secret-scanner CI-integration gap. Underlying capability is
      preserved across the split.
