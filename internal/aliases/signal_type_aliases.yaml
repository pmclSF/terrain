# Signal-type alias registry — the deprecation runway for rule splits / renames.
#
# When a rule is split or renamed in a later release, the old rule_id is
# registered here. User policies, suppressions, and CLI flags that reference
# the old ID continue to work — they expand to all the new IDs the alias
# replaces. Terrain emits a one-time `[NOTE]` on stderr when an alias is hit,
# pointing at the new IDs so the user can update.
#
# Schema:
#   version:       1
#   aliases:
#     <old_id>:
#       replaces_with:    list of new rule_ids the old ID maps to
#       deprecated_in:    semver when the old ID entered deprecation, OR
#                         "next" when the replacement IDs land in the next
#                         minor release. Resolved to a concrete semver in
#                         the same PR that ships the replacement.
#       removal_target:   semver when the alias will stop expanding, OR
#                         "future" when no removal is scheduled yet. The
#                         alias stays load-bearing until a concrete semver
#                         is set; "future" means "still active, no fixed
#                         removal date".
#       why:              short prose explaining the split / rename
#
# Adding an alias is part of the same PR that ships the rule split. Removing
# an alias requires bumping `removal_target` past the current release.

version: 1
aliases:
  staticSkippedTest:
    replaces_with:
      - staticSkippedTest-unconditional
      - staticSkippedTest-conditional-gate
    deprecated_in: "next"
    removal_target: "future"
    why: |
      This rule now maps to two more specific rules: one for a permanent
      skip, and one for a skip guarded by an environment, feature-flag, or
      platform condition. Point your policy or suppression at whichever
      applies.

  depsDriftRisk:
    replaces_with:
      - depsDriftRisk-strict-pin
      - depsDriftRisk-caret-policy
    deprecated_in: "next"
    removal_target: "future"
    why: |
      This rule now maps to two more specific rules: one for a bare or
      unversioned spec, and one for a caret range. Point your policy or
      suppression at whichever applies.

  aiHardcodedAPIKey:
    replaces_with:
      - aiHardcodedAPIKey-literal-shape
      - secretScannerCoverageDegraded
    deprecated_in: "next"
    removal_target: "future"
    why: |
      This rule now maps to updated rule IDs. Update any policy or
      suppression that referenced the old ID to the listed replacements.
