schemaVersion: 1
fixture: slow-test-from-junit
description: |
  A junit.xml runtime artifact records two checkout tests; one ran
  for 12.08 s, well past the 5 s default slow threshold. The runtime
  health detector reads the artifact and fires slowTest on the slow
  case.
expected:
