impact:
  cases:
    - change: "src/devices/service.ts"
      expected_impacted_tests:
        - "tests/unit/devices/service.test.ts"
        - "tests/integration/devices/flow.test.ts"
        - "tests/e2e/main/full-flow.test.ts"
        - "tests/e2e/main/quick-flow.test.ts"
    - change: "src/ai-anomaly/prompt.ts"
      expected_impacted_tests:
        - "tests/eval/safety/safety-eval.test.ts"
        - "tests/eval/safety/safety-regression.test.ts"
      expected_impacted_scenarios:
        - "safety-eval"
        - "safety-regression"
coverage:
  expected_uncovered:
    - path: "src/dashboards/service.ts"
      reason: "No test imports"
    - path: "src/firmware/service.ts"
      reason: "No test imports"
