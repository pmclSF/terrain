impact:
  cases:
    - change: "src/shipments/service.ts"
      expected_impacted_tests:
        - "tests/unit/shipments/service.test.ts"
        - "tests/integration/shipments/flow.test.ts"
        - "tests/e2e/main/full-flow.test.ts"
        - "tests/e2e/main/quick-flow.test.ts"
    - change: "src/ai-routing/prompt.ts"
      expected_impacted_tests:
        - "tests/eval/safety/safety-eval.test.ts"
        - "tests/eval/safety/safety-regression.test.ts"
      expected_impacted_scenarios:
        - "safety-eval"
        - "safety-regression"
coverage:
  expected_uncovered:
    - path: "src/inventory/service.ts"
      reason: "No test imports"
    - path: "src/routing/service.ts"
      reason: "No test imports"
redundancy:
  expected_clusters:
    - tests:
        - "tests/e2e/main/full-flow.test.ts"
        - "tests/e2e/main/quick-flow.test.ts"
      reason: "Overlapping e2e"
fanout:
  expected_flagged:
    - node: "shared"
      expected_min_dependents: 3
ai:
  expected_scenarios: 3
  expected_prompt_surfaces:
    - "src/ai-routing/prompt.ts:systemPrompt"
    - "src/ai-routing/prompt.ts:buildPrompt"
    - "src/ai-routing/prompt.ts:buildSafetyPrompt"
  expected_dataset_surfaces:
    - "src/ai-routing/dataset.ts:evalDataset"
    - "src/ai-routing/dataset.ts:loadEvalDataset"
    - "src/ai-routing/dataset.ts:splitEvalData"
environment:
  description: "No env"
  notes: "logistics-platform"
