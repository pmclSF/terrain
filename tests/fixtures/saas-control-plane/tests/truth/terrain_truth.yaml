impact:
  description: "Change impact should trace through dependency graph correctly"
  cases:
    - change: "src/auth/login.ts"
      expected_impacted_tests:
        - "tests/unit/auth/login.test.ts"
        - "tests/integration/auth/auth-billing.test.ts"
        - "tests/e2e/admin/admin-onboarding.test.ts"
        - "tests/e2e/admin/admin-setup.test.ts"
        - "tests/e2e/purchase/purchase-flow.test.ts"
        - "tests/e2e/purchase/upgrade-flow.test.ts"
      notes: "Auth login is imported directly by integration and all e2e flows"

    - change: "src/ai-assistant/prompt.ts"
      expected_impacted_tests:
        - "tests/eval/safety/prompt-safety.test.ts"
        - "tests/eval/safety/safety-regression.test.ts"
      expected_impacted_scenarios:
        - "prompt-safety"
        - "safety-regression"
      notes: "Prompt changes should reach both safety eval files and both scenarios"

    - change: "src/shared-db.ts"
      expected_min_impacted: 5
      notes: "High-fanout: shared-db is imported by integration and e2e tests"

coverage:
  description: "Coverage analysis should identify structural gaps"
  expected_uncovered:
    - path: "src/notifications/email.ts"
      reason: "Manual-only zone, no automated test imports"
    - path: "src/notifications/webhook.ts"
      reason: "Manual-only zone, no automated test imports"

redundancy:
  description: "Redundancy detection should find duplicate test clusters"
  expected_clusters:
    - tests:
        - "tests/e2e/admin/admin-onboarding.test.ts"
        - "tests/e2e/admin/admin-setup.test.ts"
      reason: "Near-identical admin onboarding flows"
    - tests:
        - "tests/e2e/purchase/purchase-flow.test.ts"
        - "tests/e2e/purchase/upgrade-flow.test.ts"
      reason: "Overlapping purchase flows"

fanout:
  description: "Fanout analysis should flag high-dependency nodes"
  expected_flagged:
    - node: "src/shared-db.ts"
      expected_min_dependents: 5
      reason: "Imported by all integration and e2e tests"

ai:
  description: "AI scenario analysis should detect overlap and coverage"
  expected_scenarios: 3
  expected_prompt_surfaces:
    - "src/ai-assistant/prompt.ts:systemPrompt"
    - "src/ai-assistant/prompt.ts:buildQueryPrompt"
    - "src/ai-assistant/prompt.ts:buildSafetyPrompt"
  expected_dataset_surfaces:
    - "src/ai-assistant/dataset.ts:supportDataset"
    - "src/ai-assistant/dataset.ts:loadEvalDataset"
    - "src/ai-assistant/dataset.ts:splitDataset"

environment:
  description: "No environment classes declared in this fixture"
  notes: "B2B SaaS fixture focuses on domain coverage, not environment matrix."
