# Terrain World — Ground Truth Specification
#
# This file documents the expected findings when Terrain analyzes the
# terrain-world fixture. Each category lists what Terrain SHOULD detect.
# Used for precision/recall validation of the reasoning engine.

impact:
  description: "Change impact should trace through the dependency graph correctly"
  cases:
    - change: "src/auth/login.ts"
      expected_impacted_tests:
        - "tests/unit/auth/login.test.ts"
        - "tests/integration/auth/auth-flow.test.ts"
        - "tests/e2e/purchase/full-purchase.test.ts"
        - "tests/e2e/purchase/checkout-flow.test.ts"
        - "tests/e2e/mobile/mobile-purchase.test.ts"
      notes: "Auth changes should cascade through integration and e2e but NOT reach AI scenarios"

    - change: "src/ai-assistant/prompt.ts"
      expected_impacted_scenarios:
        - "prompt-safety"
        - "safety-regression"
      expected_impacted_tests:
        - "tests/eval/safety/prompt-safety.test.ts"
        - "tests/eval/safety/safety-regression.test.ts"
      notes: "Prompt changes should reach both safety scenarios"

    - change: "src/shared-db.ts"
      notes: "High-fanout: should impact many tests across domains"
      expected_min_impacted: 6

coverage:
  description: "Coverage analysis should identify structural gaps"
  expected_uncovered:
    - path: "src/payments/subscription.ts"
      reason: "No unit tests exist for subscription functions"
    - path: "src/notifications/push.ts"
      reason: "Manual-only zone — no automated test imports"
  expected_weak:
    - path: "src/payments/charge.ts"
      reason: "Only createCharge tested; captureCharge and voidCharge uncovered"

redundancy:
  description: "Redundancy detection should find duplicate test clusters"
  expected_clusters:
    - tests:
        - "tests/unit/mobile/purchase.test.ts"
        - "tests/unit/mobile/purchase-v2.test.ts"
      reason: "Near-identical test files for mobile purchase"
    - tests:
        - "tests/e2e/purchase/full-purchase.test.ts"
        - "tests/e2e/purchase/checkout-flow.test.ts"
      reason: "Overlapping e2e flows with same import graph"

fanout:
  description: "Fanout analysis should flag high-dependency nodes"
  expected_flagged:
    - node: "src/shared-db.ts"
      reason: "Imported by 6+ test files across integration and e2e layers"
      expected_min_dependents: 6

stability:
  description: "Stability signals should detect skipped and flaky patterns"
  expected_skipped:
    - file: "tests/unit/refunds/refund.test.ts"
      count: 4
      reason: "4 tests marked with it.skip"
  notes: "Without runtime data, skip detection relies on code patterns (skippedTest signal)"

ai:
  description: "AI scenario analysis should detect overlap and coverage"
  expected_scenarios: 4
  expected_scenario_duplication:
    - pair: ["prompt-safety", "safety-regression"]
      overlap: ">50%"
      reason: "Both scenarios cover the same 2 surfaces (buildSafetyPrompt, systemPrompt)"
  expected_prompt_surfaces:
    - "src/ai-assistant/prompt.ts:systemPrompt"
    - "src/ai-assistant/prompt.ts:buildUserPrompt"
    - "src/ai-assistant/prompt.ts:buildSafetyPrompt"
  expected_dataset_surfaces:
    - "src/ai-assistant/dataset.ts:trainingDataset"
    - "src/ai-assistant/dataset.ts:loadEvalDataset"
    - "src/ai-assistant/dataset.ts:splitDataset"

environment:
  description: "Environment and platform coverage"
  notes: |
    Mobile tests exercise both iOS and Android platforms.
    No environment classes are declared in this fixture,
    but the mobile tests demonstrate platform-conditional patterns
    that environment matrix analysis would surface if classes were defined.
