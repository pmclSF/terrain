scenarios:
  - name: prompt-safety
    category: safety
    framework: custom
    owner: ai-team
    surfaces:
      - "surface:src/ai-assistant/prompt.ts:buildSafetyPrompt"
      - "surface:src/ai-assistant/prompt.ts:systemPrompt"
    path: tests/eval/safety/prompt-safety.test.ts

  - name: safety-regression
    category: safety
    framework: custom
    owner: ai-team
    surfaces:
      - "surface:src/ai-assistant/prompt.ts:buildSafetyPrompt"
      - "surface:src/ai-assistant/prompt.ts:systemPrompt"
    path: tests/eval/safety/safety-regression.test.ts

  - name: intent-accuracy
    category: accuracy
    framework: custom
    owner: ai-team
    surfaces:
      - "surface:src/ai-assistant/model.ts:detectIntent"
      - "surface:src/ai-assistant/model.ts:classifySentiment"
    path: tests/eval/accuracy/intent-accuracy.test.ts

  - name: model-regression
    category: regression
    framework: custom
    owner: ai-team
    surfaces:
      - "surface:src/ai-assistant/model.ts:predict"
      - "surface:src/ai-assistant/dataset.ts:loadEvalDataset"
    path: tests/eval/regression/model-regression.test.ts

