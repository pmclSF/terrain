# Terrain — recommended GitHub Action workflow.
#
# This is the ONE config the project recommends. Drop it into
# `.github/workflows/terrain-pr.yml`, commit, and you have:
#
#   - per-PR `terrain test` running on every push
#   - step-summary markdown rendered on the workflow run page
#   - JUnit XML so GitHub's test reporter shows Terrain findings
#   - a unified PR comment with the change-scoped risk report
#   - warn-only by default; one-line opt-in to flip on blocking gates
#
# The two-step flow at the heart of Terrain (`terrain analyze` →
# `terrain report pr`) is the workflow's spine; `terrain test` is a
# CI-mode wrapper that runs analyze and emits the CI-friendly artifacts.
#
# Trust: see `SECURITY-DATA-HANDLING.md` for the data-flow posture.
# Policy: see `docs/policy/examples/{minimal,balanced,strict}.yaml`.

name: Terrain

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an older Terrain run when a newer commit lands on the same PR.
concurrency:
  group: terrain-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # required for the PR-comment step
  checks: write          # required for SARIF / annotations

jobs:
  terrain:
    name: Terrain
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out the PR head
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so `--base main` diffs work

      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Install Terrain
        # Pick the install path that matches your runner image.
        # npm is the friction-light default; Homebrew also works on
        # ubuntu-latest if Linuxbrew is preinstalled; `go install`
        # works on any image with Go 1.23+.
        run: |
          npm install -g mapterrain
          terrain version

      # ── Step 1 of the primary workflow: analyze + emit CI artifacts ─
      #
      # `terrain test` is the CI-mode wrapper around `analyze`. It
      # writes JUnit XML (so GitHub's test reporter shows Terrain
      # findings) and a markdown step summary (so reviewers see the
      # report on the workflow run page without opening artifacts).
      #
      # To flip from warn-only to blocking, add `--fail-on=high` (exit
      # 6 on any High+ finding). For onboarding a repo with existing
      # debt, add `--new-findings-only --baseline <path>` so only
      # regressions block — the baseline path is typically a snapshot
      # uploaded from your main-branch CI as a workflow artifact.
      - name: terrain test (warn-only by default)
        run: |
          terrain test \
            --junit terrain-results.xml \
            --summary "$GITHUB_STEP_SUMMARY"
            # --fail-on=high    # uncomment to gate the build (exit 6)

      # ── Step 2: render the PR comment ──────────────────────────────
      # `report pr` summarizes the change-scoped risk. Exit status here
      # is independent of step 1's gating decision.
      - name: terrain report pr
        run: |
          terrain report pr \
            --base ${{ github.event.pull_request.base.sha }} \
            --format markdown \
            > terrain-pr-comment.md

      - name: Post or update the PR comment
        uses: peter-evans/create-or-update-comment@v5
        if: github.event_name == 'pull_request'
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: terrain-pr-comment.md
          edit-mode: replace
          # Stable comment marker so successive runs update the same
          # thread instead of stacking new comments.
          body-includes: '<!-- terrain-pr-report -->'

      # Upload the canonical findings artifact so downstream tooling
      # (IDE plugins, SARIF uploaders, audit pipelines) can consume it.
      - name: Upload findings.json
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: terrain-findings
          path: .terrain/findings.json

      # Optional: upload SARIF for GitHub code scanning. Adds Terrain
      # findings to the Security tab alongside CodeQL / Snyk / etc.
      - name: terrain analyze (SARIF)
        run: |
          terrain analyze --format sarif --redact-paths > terrain.sarif

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: terrain.sarif
          category: terrain
