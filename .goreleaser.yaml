version: 2

project_name: terrain

# Multi-platform CGO build.
#
# go-tree-sitter (smacker/go-tree-sitter) requires CGO. CGO cannot cross-compile
# from a single host without a target-specific C toolchain, so each platform is
# built on its own runner via the GitHub Actions matrix in .github/workflows/release.yml:
#
#   ubuntu-latest  -> terrain-linux   (linux/amd64, linux/arm64)
#   macos-latest   -> terrain-darwin  (darwin/amd64, darwin/arm64)
#   windows-latest -> terrain-windows (windows/amd64)
#
# Each runner invokes `goreleaser release --clean --split --id=<build-id>`
# (or filters by `--single-target`), and a final aggregate job stitches the
# release together. linux/arm64 is cross-compiled on amd64 with `gcc-aarch64-linux-gnu`.
builds:
  - id: terrain-linux-amd64
    main: ./cmd/terrain
    binary: terrain
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: terrain-linux-arm64
    main: ./cmd/terrain
    binary: terrain
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    goos:
      - linux
    goarch:
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: terrain-darwin
    main: ./cmd/terrain
    binary: terrain
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: terrain-windows
    main: ./cmd/terrain
    binary: terrain
    env:
      - CGO_ENABLED=1
    goos:
      - windows
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - formats: [ 'tar.gz' ]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [ 'zip' ]
    # 0.2.0 final-polish: include README + LICENSE in every archive.
    # Pre-fix archives shipped only the binary; users who downloaded
    # the tarball had no in-tree license text — a soft compliance
    # issue for any company-policy review of OSS dependencies.
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

brews:
  - name: mapterrain
    homepage: "https://github.com/pmclSF/terrain"
    description: "Signal-first test intelligence CLI"
    license: "Apache-2.0"
    directory: Formula
    repository:
      owner: pmclSF
      name: homebrew-terrain
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    install: |
      bin.install "terrain"
    test: |
      system "#{bin}/terrain", "version"
    # Build IDs included in the Homebrew formula. Linux is omitted because
    # Homebrew on Linux is much rarer and adds release-pipeline complexity
    # we'll revisit in 0.2 once macOS distribution is stable.
    ids:
      - terrain-darwin

# ── SBOM Generation ────────────────────────────────────────
# Generates Software Bill of Materials for each release archive.
# Requires syft (https://github.com/anchore/syft) on the build host.
# GoReleaser GitHub Action installs syft automatically when sboms: is present.
#
# Produces two formats per archive:
#   - CycloneDX JSON (.cdx.json) — widely supported by dependency-track, Snyk, etc.
#   - SPDX JSON (.spdx.json) — ISO/IEC 5962:2021, required by some compliance frameworks
sboms:
  - id: cyclonedx
    artifacts: archive
    cmd: syft
    args:
      - "${artifact}"
      - "--output"
      - "cyclonedx-json=${document}"
    documents:
      - "{{ .ArtifactName }}.cdx.json"

  - id: spdx
    artifacts: archive
    cmd: syft
    args:
      - "${artifact}"
      - "--output"
      - "spdx-json=${document}"
    documents:
      - "{{ .ArtifactName }}.spdx.json"

# ── Artifact Signing (Sigstore / cosign) ───────────────────
# Keyless signing via Sigstore OIDC (uses GitHub Actions id-token).
# Requires cosign (https://github.com/sigstore/cosign) on the build host.
# Set COSIGN_ENABLED=1 in the release workflow environment to activate.
#
# When enabled, produces:
#   - .sig files (detached signatures) for checksums, SBOMs, and archives
#   - Signatures are verifiable via: cosign verify-blob --certificate-identity ...
#
# When COSIGN_ENABLED is unset or empty, signing is skipped gracefully.
signs:
  - id: sign-checksum
    cmd: cosign
    artifacts: checksum
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
    env:
      - COSIGN_EXPERIMENTAL=1
    output: true

  - id: sign-sbom
    cmd: cosign
    artifacts: sbom
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
    env:
      - COSIGN_EXPERIMENTAL=1
    output: true

  - id: sign-archive
    cmd: cosign
    artifacts: archive
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
    env:
      - COSIGN_EXPERIMENTAL=1
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: pmclSF
    name: terrain
